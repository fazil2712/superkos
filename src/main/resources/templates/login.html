<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Superkos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-text {
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981, #3b82f6, #a855f7, #ef4444);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 5s linear infinite;
        }

        .rainbow-bg {
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981, #3b82f6, #a855f7, #ef4444);
            background-size: 200% auto;
            animation: gradientFlow 5s linear infinite;
            color: white !important;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <a href="/" class="text-3xl font-bold mb-2 block"><i class="fas fa-home rainbow-text"></i> <span class="rainbow-text">Superkos</span></a>
            <h1 class="text-xl font-bold text-gray-800">Selamat Datang Kembali</h1>
            <p class="text-gray-500 text-sm">Masuk untuk melanjutkan ke akun Anda</p>
        </div>

        <div th:if="${error != null}" class="bg-red-50 text-red-500 p-3 rounded mb-4 text-sm text-center border border-red-200" th:text="${error}">
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:border-purple-400 focus:ring-1 focus:ring-purple-400 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:border-purple-400 focus:ring-1 focus:ring-purple-400 transition">
            </div>

            <button type="submit" class="w-full rainbow-bg text-white font-bold py-3 rounded-lg transition shadow">
                Masuk
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            Belum punya akun? <a href="/register" class="text-purple-600 font-bold hover:underline">Daftar sekarang</a>
        </p>
    </div>

</body>
</html>
