<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Chat dengan ' + ${other.nama} + ' - Superkos'">Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes gradientFlow {
            0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
        }
        .rainbow-text {
            background: linear-gradient(90deg,#ef4444,#f59e0b,#10b981,#3b82f6,#a855f7,#ef4444);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: gradientFlow 5s linear infinite;
        }
        .rainbow-bg {
            background: linear-gradient(90deg,#ef4444,#f59e0b,#10b981,#3b82f6,#a855f7,#ef4444);
            background-size: 200% auto; animation: gradientFlow 5s linear infinite; color: white;
        }
        .avatar-ring { background: linear-gradient(135deg,#ef4444,#f59e0b,#10b981,#3b82f6,#a855f7); padding: 2px; border-radius: 50%; }
        .avatar-inner { background: white; border-radius: 50%; padding: 2px; }
        .avatar-sm { background: linear-gradient(135deg,#6366f1,#a855f7); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: .9rem; }

        /* Chat layout — full viewport minus navbar */
        .chat-layout {
            display: flex; flex-direction: column;
            height: calc(100vh - 64px);
        }

        /* Chat header */
        .chat-header {
            background: white; border-bottom: 1.5px solid #f3f4f6;
            padding: 14px 24px; display: flex; align-items: center; gap: 14px;
            flex-shrink: 0; box-shadow: 0 1px 8px rgba(0,0,0,.04);
        }

        /* Scrollable messages area */
        .messages-area {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            background: #f9fafb;
        }

        /* Bubble */
        .bubble-wrap { display: flex; align-items: flex-end; gap: 8px; }
        .bubble-wrap.mine { flex-direction: row-reverse; }

        .bubble {
            padding: 10px 16px; border-radius: 18px;
            font-size: .9rem; line-height: 1.45; word-break: break-word;
        }
        .bubble.theirs {
            background: white; color: #111827;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
        }
        .bubble.mine {
            background: linear-gradient(135deg,#a855f7,#3b82f6);
            color: white; border-bottom-right-radius: 4px;
        }

        .bubble-time {
            font-size: .65rem; color: #9ca3af;
            flex-shrink: 0; margin-bottom: 2px;
        }
        .bubble-wrap.mine .bubble-time { text-align: right; }

        /* Mini avatar inside chat */
        .chat-av {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: .75rem; color: white; flex-shrink: 0;
        }

        /* Input bar */
        .input-bar {
            background: white; border-top: 1.5px solid #f3f4f6;
            padding: 14px 20px; display: flex; gap: 10px; align-items: center;
            flex-shrink: 0;
        }
        .msg-input {
            flex: 1; border: 1.5px solid #e5e7eb; border-radius: 24px;
            padding: 10px 18px; outline: none; font-size: .9rem;
            font-family: 'Inter', sans-serif; color: #111827; background: #f9fafb;
            transition: border-color .2s, box-shadow .2s;
        }
        .msg-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168,85,247,.12);
            background: white;
        }
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg,#a855f7,#3b82f6);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: white; font-size: .95rem; flex-shrink: 0;
            transition: transform .15s, box-shadow .15s;
            box-shadow: 0 4px 14px rgba(168,85,247,.35);
        }
        .send-btn:hover { transform: scale(1.08); }
        .send-btn:active { transform: scale(.96); }

        /* Date divider */
        .date-divider {
            text-align: center; font-size: .7rem; color: #9ca3af; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
        }
        .date-divider::before, .date-divider::after {
            content: ''; flex: 1; height: 1px; background: #e5e7eb;
        }
    </style>
    <div th:replace="~{fragments/dropdown :: dropdown-css}"></div>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<header class="border-b border-gray-200 sticky top-0 bg-white z-50" style="height:64px;">
    <div class="max-w-full px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div th:replace="~{fragments/dropdown :: dropdown-html}"></div>
            <a href="/" class="flex items-center gap-2 text-xl font-bold">
                <i class="fas fa-home rainbow-text"></i><span class="rainbow-text">Superkos</span>
            </a>
        </div>
    </div>
</header>

<!-- Full-height Chat Layout -->
<div class="chat-layout">

    <!-- Chat Header -->
    <div class="chat-header">
        <a href="/roommate/inbox" class="text-gray-400 hover:text-gray-700 transition mr-1">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="chat-av" style="background: linear-gradient(135deg,#a855f7,#3b82f6);"
             th:text="${other.nama != null && !other.nama.isEmpty() ? other.nama.substring(0,1).toUpperCase() : '?'}">A</div>
        <div>
            <p class="font-bold text-gray-900 text-sm" th:text="${other.nama}">Nama</p>
            <p class="text-xs text-green-500 font-semibold flex items-center gap-1">
                <span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block"></span>
                Terhubung sebagai roommate
            </p>
        </div>
    </div>

    <!-- Messages Area -->
    <div class="messages-area" id="messagesArea">

        <!-- Empty state -->
        <div th:if="${messages.empty}" class="flex-1 flex flex-col items-center justify-center py-16 text-center">
            <div class="w-16 h-16 rounded-2xl bg-purple-100 flex items-center justify-center mb-4">
                <i class="fas fa-comment-dots text-3xl text-purple-400"></i>
            </div>
            <p class="font-semibold text-gray-600 mb-1">Belum ada pesan</p>
            <p class="text-gray-400 text-sm">Mulai obrolan dengan <span th:text="${other.nama}">nama</span>!</p>
        </div>

        <!-- Messages -->
        <div th:each="msg : ${messages}"
             th:with="isMine=${msg.sender.id == loggedInUser.id}"
             class="bubble-wrap"
             th:classappend="${isMine} ? ' mine' : ''">

            <!-- Their avatar (only on their side) -->
            <div th:unless="${isMine}"
                 class="chat-av flex-shrink-0" style="background: linear-gradient(135deg,#a855f7,#3b82f6);"
                 th:text="${other.nama != null && !other.nama.isEmpty() ? other.nama.substring(0,1).toUpperCase() : '?'}">A</div>

            <div class="flex flex-col gap-0.5 max-w-[72%]" th:classappend="${isMine} ? ' items-end' : ' items-start'">
                <div class="bubble" th:classappend="${isMine} ? ' mine' : ' theirs'"
                     th:text="${msg.isiPesan}">pesan</div>
                <span class="bubble-time"
                      th:text="${#dates.format(msg.timestamp, 'HH:mm')}">00:00</span>
            </div>

            <!-- My avatar (only on my side) -->
            <div th:if="${isMine}"
                 class="chat-av flex-shrink-0" style="background: linear-gradient(135deg,#6366f1,#a855f7);"
                 th:text="${loggedInUser.nama != null && !loggedInUser.nama.isEmpty() ? loggedInUser.nama.substring(0,1).toUpperCase() : '?'}">A</div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <form th:action="@{'/chat/' + ${room.idChat} + '/send'}" method="post"
              class="flex gap-3 items-center w-full" id="chatForm">
            <input type="text" name="isiPesan" class="msg-input"
                   placeholder="Ketik pesan..." autocomplete="off" id="msgInput"
                   required maxlength="1000">
            <button type="submit" class="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

</div>

<div th:replace="~{fragments/dropdown :: dropdown-js}"></div>
<script>
    // Auto-scroll to bottom on load
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;

    // Submit on Enter key (not Shift+Enter)
    document.getElementById('msgInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            document.getElementById('chatForm').submit();
        }
    });
</script>

</body>
</html>
