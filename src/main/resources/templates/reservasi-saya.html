<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Reservasi Saya - SuperKos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body class="bg-slate-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-10">
      <!-- Header -->

      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-4xl font-bold text-slate-800">
            Reservasi Saya
            <span
              class="text-violet-600"
              th:text="'(' + ${#lists.size(reservasiList)} + ')'"
            >
            </span>
          </h1>

          <p class="text-slate-500 mt-2">
            Daftar seluruh reservasi hunian yang pernah diajukan
          </p>
        </div>

        <a
          href="/"
          class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-3 rounded-xl transition"
        >
          <i class="fas fa-home mr-2"></i>
          Kembali ke Beranda
        </a>
      </div>

      <!-- Empty State -->

      <div
        th:if="${#lists.isEmpty(reservasiList)}"
        class="bg-white rounded-3xl shadow-md p-12 text-center"
      >
        <i class="fas fa-file-signature text-6xl text-slate-300 mb-5"></i>

        <h2 class="text-2xl font-bold text-slate-700 mb-2">
          Belum Ada Reservasi
        </h2>

        <p class="text-slate-500 mb-6">
          Kamu belum pernah mengajukan reservasi hunian.
        </p>

        <a
          href="/"
          class="inline-block bg-violet-600 hover:bg-violet-700 text-white px-6 py-3 rounded-xl"
        >
          Cari Hunian
        </a>
      </div>

      <!-- Reservasi List -->

      <div
        th:if="${!#lists.isEmpty(reservasiList)}"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <div
          th:each="r : ${reservasiList}"
          class="bg-white rounded-3xl shadow-md hover:shadow-xl transition overflow-hidden"
        >
          <!-- Header -->

          <div class="p-5 border-b">
            <div class="flex justify-between items-start">
              <h2
                class="font-bold text-lg text-slate-800"
                th:text="${r.hunian.namaHunian}"
              ></h2>

              <!-- STATUS -->

              <span
                th:if="${r.status == 'PENDING'}"
                class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold"
              >
                PENDING
              </span>

              <span
                th:if="${r.status == 'ACCEPTED'}"
                class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold"
              >
                ACCEPTED
              </span>

              <span
                th:if="${r.status == 'REJECTED'}"
                class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold"
              >
                REJECTED
              </span>
            </div>
          </div>

          <!-- Body -->

          <div class="p-5 space-y-4">
            <div>
              <p class="text-xs text-slate-400">Lokasi</p>

              <p class="font-medium" th:text="${r.hunian.lokasi}"></p>
            </div>

            <div>
              <p class="text-xs text-slate-400">Harga</p>

              <p
                class="font-medium text-violet-600"
                th:text="'Rp ' + ${#numbers.formatDecimal(r.hunian.harga,0,'POINT',0,'COMMA')}"
              ></p>
            </div>

            <div>
              <p class="text-xs text-slate-400">Tanggal Pengajuan</p>

              <p
                th:text="${#dates.format(r.tanggalPengajuan,'dd MMM yyyy HH:mm')}"
              ></p>
            </div>

            <!-- Alasan Ditolak -->

            <div
              th:if="${r.status == 'REJECTED' and r.alasanPenolakan != null}"
              class="bg-red-50 border border-red-200 rounded-xl p-3"
            >
              <p class="text-red-700 text-sm">
                <strong>Alasan Penolakan:</strong>

                <span th:text="${r.alasanPenolakan}"></span>
              </p>
            </div>
          </div>

          <!-- Footer -->

          <div class="px-5 pb-5">
            <a
              th:href="@{/hunian/{id}(id=${r.hunian.idHunian})}"
              class="block text-center bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl transition"
            >
              <i class="fas fa-eye mr-2"></i>
              Lihat Hunian
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
