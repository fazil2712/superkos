<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- CSS for Dropdown -->
<style th:fragment="dropdown-css">
    .avatar-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .avatar-ring {
        background: linear-gradient(135deg, #ef4444, #f59e0b, #10b981, #3b82f6, #a855f7);
        background-size: 300% 300%;
        animation: gradientFlow 4s ease infinite;
        padding: 2px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .avatar-inner {
        background: white;
        border-radius: 50%;
        padding: 2px;
    }
    .dropdown-menu {
        position: absolute;
        top: calc(100% + 10px);
        left: 0;
        min-width: 230px;
        background: white;
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.13);
        border: 1px solid #f3f4f6;
        z-index: 1000;
        overflow: hidden;
        opacity: 0;
        transform: translateY(-6px) scale(0.97);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .dropdown-menu.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
    }
    .dropdown-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #f3f4f6;
    }
    .dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        font-size: 0.88rem;
        font-weight: 500;
        color: #374151;
        text-decoration: none;
        transition: background 0.15s;
    }
    .dropdown-item:hover {
        background: #faf5ff;
        color: #7c3aed;
    }
    .dropdown-item.danger {
        color: #ef4444;
    }
    .dropdown-item.danger:hover {
        background: #fff5f5;
        color: #dc2626;
    }
    .dropdown-item i {
        width: 18px;
        text-align: center;
    }
    .role-badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        margin-top: 3px;
    }
    .inbox-badge {
        background: #ef4444;
        color: white;
        font-size: 0.65rem;
        font-weight: 800;
        border-radius: 999px;
        min-width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        margin-left: auto;
        border: 1.5px solid white;
        box-shadow: 0 1px 4px rgba(239,68,68,0.3);
    }
</style>

<!-- HTML for Dropdown -->
<div th:fragment="dropdown-html" th:if="${loggedInUser != null}" class="avatar-btn" id="avatarBtn" style="position:relative;">
    <div class="avatar-ring" title="Profil Saya" style="position: relative;">
        <div class="avatar-inner">
            <div class="avatar-initials"
                 style="background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.05em;"
                 th:text="${loggedInUser.nama != null && !loggedInUser.nama.isEmpty() ? loggedInUser.nama.substring(0,1).toUpperCase() : '?'}">
                ?
            </div>
        </div>
        <!-- Dot notification badge on the avatar itself -->
        <span th:if="${inboxNotificationCount > 0}"
              style="position: absolute; top: -1px; right: -1px; width: 11px; height: 11px; background: #ef4444; border: 2px solid white; border-radius: 50%; box-shadow: 0 1px 4px rgba(239,68,68,0.4);"></span>
    </div>
    <i class="fas fa-chevron-down text-gray-400 text-xs transition-transform duration-200" id="avatarChevron"></i>

    <!-- Dropdown Panel -->
    <div class="dropdown-menu" id="dropdownMenu">
        <!-- User Header -->
        <div class="dropdown-header">
            <p class="font-bold text-gray-900 text-sm" th:text="${loggedInUser.nama}">Nama User</p>
            <p class="text-gray-400 text-xs" th:text="${loggedInUser.email}">email</p>
            <span th:if="${loggedInUser.class.simpleName == 'PencariHunian'}"
                  class="role-badge bg-purple-100 text-purple-700">Pencari Hunian</span>
            <span th:if="${loggedInUser.class.simpleName == 'PemilikProperti'}"
                  class="role-badge bg-blue-100 text-blue-700">Pemilik Properti</span>
        </div>
        <!-- Menu Items -->
        <div class="py-1">
            <!-- Common: Beranda — different link depending on role -->
            <a th:if="${loggedInUser.class.simpleName == 'PencariHunian'}" href="/" class="dropdown-item">
                <i class="fas fa-home"></i> Beranda
            </a>
            <a th:if="${loggedInUser.class.simpleName == 'PemilikProperti'}" href="/pemilik/dashboard" class="dropdown-item">
                <i class="fas fa-home"></i> Beranda
            </a>

            <!-- Common: Edit Profil -->
            <a href="/profile" class="dropdown-item">
                <i class="fas fa-user-edit"></i> Edit Profil
            </a>

            <!-- PencariHunian only -->
            <a href="/settings" class="dropdown-item"
               th:if="${loggedInUser.class.simpleName == 'PencariHunian'}">
                <i class="fas fa-cog"></i> Pengaturan Kuis
            </a>
            <a href="/wishlist" class="dropdown-item"
               th:if="${loggedInUser.class.simpleName == 'PencariHunian'}">
                <i class="fas fa-heart" style="color:#ef4444"></i> Wishlist Saya
            </a>
            <a href="/roommate/match" class="dropdown-item"
               th:if="${loggedInUser.class.simpleName == 'PencariHunian'}">
                <i class="fas fa-user-friends" style="color:#3b82f6"></i> Cari Roommate
            </a>
            <a href="/roommate/inbox" class="dropdown-item"
               th:if="${loggedInUser.class.simpleName == 'PencariHunian'}">
                <i class="fas fa-inbox" style="color:#8b5cf6"></i> Kotak Masuk
                <span th:if="${inboxNotificationCount > 0}"
                      class="inbox-badge"
                      th:text="${inboxNotificationCount > 99 ? '99+' : inboxNotificationCount}">0</span>
            </a>

            <!-- PemilikProperti only -->
            <a href="/pemilik/properti" class="dropdown-item"
               th:if="${loggedInUser.class.simpleName == 'PemilikProperti'}">
                <i class="fas fa-building" style="color:#3b82f6"></i> Kelola Properti
            </a>

            <div style="height:1px; background:#f3f4f6; margin: 4px 0;"></div>
            <a href="/logout" class="dropdown-item danger">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </a>
        </div>
    </div>
</div>

<!-- JS for Dropdown -->
<script th:fragment="dropdown-js">
    const avatarBtn = document.getElementById('avatarBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const avatarChevron = document.getElementById('avatarChevron');

    if (avatarBtn) {
        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const isOpen = dropdownMenu.classList.contains('open');
            dropdownMenu.classList.toggle('open');
            if (avatarChevron) {
                avatarChevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
            }
        });

        document.addEventListener('click', function() {
            if(dropdownMenu) dropdownMenu.classList.remove('open');
            if (avatarChevron) avatarChevron.style.transform = 'rotate(0deg)';
        });
    }
</script>

</body>
</html>
