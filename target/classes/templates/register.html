<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Superkos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        @keyframes rainbow-text {
            0%, 100% { color: #ef4444; }
            16% { color: #f59e0b; }
            33% { color: #10b981; }
            50% { color: #3b82f6; }
            66% { color: #6366f1; }
            83% { color: #a855f7; }
        }
        @keyframes rainbow-bg {
            0%, 100% { background-color: #ef4444; border-color: #ef4444; }
            16% { background-color: #f59e0b; border-color: #f59e0b; }
            33% { background-color: #10b981; border-color: #10b981; }
            50% { background-color: #3b82f6; border-color: #3b82f6; }
            66% { background-color: #6366f1; border-color: #6366f1; }
            83% { background-color: #a855f7; border-color: #a855f7; }
        }
        @keyframes rainbow-border {
            0%, 100% { border-color: #ef4444; }
            16% { border-color: #f59e0b; }
            33% { border-color: #10b981; }
            50% { border-color: #3b82f6; }
            66% { border-color: #6366f1; }
            83% { border-color: #a855f7; }
        }
        .rainbow-animate { animation: rainbow-text 8s linear infinite !important; }
        .rainbow-animate-bg { animation: rainbow-bg 8s linear infinite !important; color: white !important; }
        .rainbow-animate-border { animation: rainbow-border 8s linear infinite !important; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <a href="/" class="text-3xl font-bold rainbow-animate mb-2 block"><i class="fas fa-home"></i> Superkos</a>
            <h1 class="text-xl font-bold text-gray-800">Daftar Akun Baru</h1>
            <p class="text-gray-500 text-sm">Bergabung dengan platform kos nomor 1</p>
        </div>

        <div th:if="${error != null}" class="bg-red-50 text-red-500 p-3 rounded mb-4 text-sm text-center border border-red-200" th:text="${error}">
        </div>

        <form action="/register" method="POST" class="space-y-4" id="registerForm">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Daftar Sebagai</label>
                <div class="flex gap-4">
                    <label class="flex-1 border border-gray-300 p-3 rounded-lg flex items-center gap-2 cursor-pointer hover:bg-gray-50 focus-within:rainbow-animate-border focus-within:ring-1">
                        <input type="radio" name="role" value="PENCARI" checked class="accent-purple-500" onchange="toggleKontak()">
                        <span class="text-sm font-medium">Pencari Hunian</span>
                    </label>
                    <label class="flex-1 border border-gray-300 p-3 rounded-lg flex items-center gap-2 cursor-pointer hover:bg-gray-50 focus-within:rainbow-animate-border focus-within:ring-1">
                        <input type="radio" name="role" value="PEMILIK" class="accent-purple-500" onchange="toggleKontak()">
                        <span class="text-sm font-medium">Pemilik Properti</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" name="nama" required class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:rainbow-animate-border focus:ring-1">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:rainbow-animate-border focus:ring-1">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:rainbow-animate-border focus:ring-1">
            </div>

            <!-- Kontak field — shown only for Pemilik Properti -->
            <div id="kontakField" style="display:none;">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Kontak <span class="text-red-500">*</span>
                    <span class="text-gray-400 font-normal">(WA / Instagram / Line)</span>
                </label>
                <input type="text" name="kontak" id="kontakInput" placeholder="Contoh: 08123456789"
                       class="w-full border border-gray-300 px-4 py-2 rounded-lg outline-none focus:rainbow-animate-border focus:ring-1">
                <p class="text-xs text-gray-400 mt-1"><i class="fas fa-info-circle"></i> Kontak akan ditampilkan pada properti Anda</p>
            </div>

            <button type="submit" class="w-full rainbow-animate-bg text-white font-bold py-3 rounded-lg transition shadow mt-2">
                Daftar Sekarang
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            Sudah punya akun? <a href="/login" class="rainbow-animate font-bold hover:underline">Masuk</a>
        </p>
    </div>

    <script>
        function toggleKontak() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const field = document.getElementById('kontakField');
            const input = document.getElementById('kontakInput');
            if (role === 'PEMILIK') {
                field.style.display = 'block';
                input.setAttribute('required', '');
            } else {
                field.style.display = 'none';
                input.removeAttribute('required');
                input.value = '';
            }
        }
    </script>

</body>
</html>
